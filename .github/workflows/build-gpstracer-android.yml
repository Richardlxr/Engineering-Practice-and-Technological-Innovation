name: Build GPSTracer Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - codex/gps-tracker-app
    paths:
      - ".github/workflows/build-gpstracer-android.yml"
      - "GPSTracer/**"

jobs:
  android-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: GPSTracer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: GPSTracer/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --runInBand

      - name: Run typecheck
        run: npm run typecheck

      - name: Generate Android project
        run: npx expo prebuild --platform android --clean

      - name: Build release APK
        run: ./gradlew assembleRelease
        working-directory: GPSTracer/android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpstracer-android-release-apk
          path: GPSTracer/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
