name: Release GPSTracer Android APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  android-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: GPSTracer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: GPSTracer/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --runInBand

      - name: Run typecheck
        run: npm run typecheck

      - name: Generate Android project
        run: npx expo prebuild --platform android --clean

      - name: Build release APK
        run: ./gradlew assembleRelease
        working-directory: GPSTracer/android

      - name: Rename APK
        run: Copy-Item android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/GPSTracer-${{ github.ref_name }}.apk
        shell: pwsh

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: GPSTracer/android/app/build/outputs/apk/release/GPSTracer-${{ github.ref_name }}.apk
          generate_release_notes: true
